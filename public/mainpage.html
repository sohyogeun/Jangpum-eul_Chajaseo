<script>
const FYS = document.getElementById('FYSSelf');
const ModalSession = document.querySelector('.Modal-session');

document.addEventListener('click', function(e) {

   
    const targetButton = e.target.closest('#FYSSelf');


    if (targetButton) {
        console.log("버튼 클릭 성공!"); 
        
        const modal = document.querySelector('.Modal-session');
        if (modal) {
            modal.style.visibility = 'visible';
        } else {
            console.error("모달을 찾을 수 없습니다.");
        }
    }
});
